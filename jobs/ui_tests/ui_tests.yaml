- job:
    name: ui_tests
    project-type: pipeline

    parameters:
      - string:
          name: REFSPEC
          default: homework_4

      - string:
          name: SELENOID_URL
          default: http://89.124.113.71/wd/hub

      - string:
          name: BROWSER
          default: chrome

