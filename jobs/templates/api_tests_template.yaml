- job-template:
      name: api_tests
      project-type: freestyle

      scm:
          - api_tests_scm

      builders:
        - shell: |
            set -e

            echo "WORKSPACE = $WORKSPACE"
            ls -la $WORKSPACE

            docker run --rm \
              -v $WORKSPACE:/workspace \
              -w /workspace \
              maven:3.9.9-eclipse-temurin-17 \
              mvn clean test