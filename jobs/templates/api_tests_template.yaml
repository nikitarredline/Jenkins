- job-template:
        name: api_tests
        project-type: freestyle

        scm:
              - api_tests_scm

        builders:
              - shell: |
                      set -e
                      
                      echo "===== DEBUG HOST ====="
                      ls -la /var/jenkins_home/workspace/api_tests
                      
                      echo "===== DOCKER TEST ====="
                      docker run --rm \
                        -v /root/jenkins_home/workspace/api_tests:/workspace \
                        -w /workspace \
                        maven:3.9.9-eclipse-temurin-17 \
                        mvn clean test