- job-template:
          name: api_tests
          project-type: freestyle

          scm:
                  - api_tests_scm

          builders:
                  - shell: |
                            set -e
                            
                            echo "===== DEBUG ====="
                            echo "WORKSPACE = $WORKSPACE"
                            ls -la "$WORKSPACE"
                            
                            echo "===== CHECK POM ====="
                            ls -la "$WORKSPACE/pom.xml"
                            
                            echo "===== RUN MAVEN TESTS (NO DOCKER) ====="
                            mvn -f "$WORKSPACE/pom.xml" clean test