- name: Create nginx config directory
  file:
    path: /root/nginx
    state: directory

- name: Render nginx config
  template:
    src: nginx.conf.j2
    dest: /root/nginx/default.conf

- name: Run nginx container
  community.docker.docker_container:
    name: nginx
    image: nginx:latest
    state: started
    restart_policy: always
    ports:
      - "80:80"
    volumes:
      - /root/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - name: ci-network
